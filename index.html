<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSUCSA</title>
    <link rel="icon" type="image/png" href="Symbol.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Gothic+Expanded+One&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            font-family: Arial, sans-serif;
        }

        .special-font {
            font-family: "Special Gothic Expanded One", sans-serif;
            font-weight: 400;
            font-style: normal;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .logo-section {
            display: flex;
            align-items: center;
        }

        .logo-section img {
            width: 200px;
        }

        .logo-section h2 {
            color: aliceblue;
            margin-left: 20px;
        }

        .menu-icon {
            cursor: pointer;
        }

        .menu-icon div {
            width: 30px;
            height: 4px;
            background-color: white;
            margin: 6px 0;
        }

        .quote {
            color: rgb(231, 145, 7);
            text-align: center;
            font-size: 24px;
            margin: 60px 40px 0 40px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-section">
            <img src="./Symbol.png" alt="MSUCSA Logo">
            <h2 class="special-font">MSU Cricket Association</h2>
        </div>
        <div onclick="toggleMenu()" class="menu-icon">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>

    <h3 class="quote special-font">
        If cricket ever felt like the one that got away, come home. We saved you a place on the pitch.
    </h3>

</body>
</html>
