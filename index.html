<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSUCSA</title>
    <link rel="icon" type="image/png" href="Symbol.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Gothic+Expanded+One&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            font-family: Arial, sans-serif;
        }

        .special-font {
            font-family: "Special Gothic Expanded One", sans-serif;
            font-weight: 400;
            font-style: normal;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .logo-section {
            display: flex;
            align-items: center;
        }

        .logo-section img {
            width: 200px;
        }

        .logo-section h2 {
            color: aliceblue;
            margin-left: 20px;
        }

        .menu-icon {
            cursor: pointer;
        }

        .menu-icon div {
            width: 30px;
            height: 4px;
            background-color: white;
            margin: 6px 0;
        }

        .quote {
            color: #ffae42;
            text-align: center;
            font-size: 24px;
            margin: 60px auto 0 auto;
            padding: 20px 30px;
            border: 2px solid #ffae42;
            border-radius: 12px;
            width: fit-content;
            transition: all 0.4s ease;
            position: relative;
        }

        .quote:hover {
            box-shadow: 0 0 15px 5px rgba(255, 174, 66, 0.6),
                        0 0 30px 10px rgba(255, 106, 0, 0.5),
                        inset 0 0 20px rgba(255, 174, 66, 0.2);
            transform: scale(1.03);
            background: radial-gradient(ellipse at center, rgba(255,106,0,0.1) 0%, transparent 70%);
            animation: glowPulse 1.6s infinite alternate;
        }

        @keyframes glowPulse {
            from {
                box-shadow: 0 0 15px 5px rgba(97, 244, 139, 0.4),
                            0 0 30px 10px rgba(255, 106, 0, 0.3),
                            inset 0 0 10px rgba(255, 174, 66, 0.1);
            }
            to {
                box-shadow: 0 0 25px 10px rgba(255, 174, 66, 0.7),
                            0 0 40px 20px rgba(255, 106, 0, 0.5),
                            inset 0 0 25px rgba(255, 174, 66, 0.3);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-section">
            <img src="./Symbol.png" alt="MSUCSA Logo">
            <h2 class="special-font">MSU Cricket Association</h2>
        </div>
        <div onclick="toggleMenu()" class="menu-icon">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>

    <h3 class="quote special-font">
        If cricket ever felt like the one that got away, come home. We saved you a place on the pitch.
    </h3>
</body>
</html>
