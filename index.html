<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSUCSA</title>
    <link rel="icon" type="image/png" href="Symbol.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            font-family: Arial, sans-serif;
        }

        .special-font {
            font-family: "Playfair Display", serif;
            font-optical-sizing: auto;
            font-weight: 500;
            font-style: normal;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
        }

        .logo-section {
            display: flex;
            align-items: center;
        }

        .logo-section img {
            width: 200px;
        }

        .logo-section h2 {
            color: aliceblue;
            margin-left: 20px;
        }

        .menu-icon {
            cursor: pointer;
        }

        .menu-icon div {
            width: 30px;
            height: 4px;
            background-color: white;
            margin: 6px 0;
        }

        .quote {
            color: #edeceb;
            text-align: center;
            font-size: 24px;
            margin-top: 30px;
            padding: 20px 30px;
            width: fit-content;
            position: relative;
            margin-left: auto;
            margin-right: auto;
        }

        #typing-text::after {
            content: '|';
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-section">
            <img src="./Symbol.png" alt="MSUCSA Logo">
            <h2>MSU Cricket Association</h2>
        </div>
        <div onclick="toggleMenu()" class="menu-icon">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>

    
    <h3 class="quote special-font" id="typing-text"></h3>

    <!-- Typing Animation Script -->
    <script>
        const quote = "If cricket ever felt like the one that got away, come home. We saved you a place on the pitch 🏏";
        const textElement = document.getElementById("typing-text");
        let index = 0;

        function typeNextChar() {
            if (index < quote.length) {
                textElement.innerHTML += quote.charAt(index);
                index++;
                setTimeout(typeNextChar, 60); 
            }
        }

        window.onload = typeNextChar;

        function toggleMenu() {
            alert("Menu clicked!");
        }
    </script>
</body>
</html>
